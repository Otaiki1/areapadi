version: "3.9"
services:
  postgres:
    build:
      context: .
      dockerfile: postgres.Dockerfile
    container_name: areapadi_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-areapadi}
      POSTGRES_USER: ${POSTGRES_USER:-areapadi_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-areapadi_user} -d ${POSTGRES_DB:-areapadi}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: areapadi_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: areapadi_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: areapadi
      RABBITMQ_DEFAULT_PASS: devpassword
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 30s
      timeout: 10s
      retries: 5

  gateway:
    build: ../gateway
    container_name: areapadi_gateway
    ports:
      - "8000:8000"
    env_file: ../.env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped

  ai-agent:
    build: ../services/ai-agent
    container_name: areapadi_ai_agent
    ports:
      - "8001:8001"
    env_file: ../.env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped

  seller-service:
    build: ../services/seller-service
    container_name: areapadi_seller_service
    ports:
      - "8002:8002"
    env_file: ../.env
    depends_on:
      postgres: { condition: service_healthy }
    restart: unless-stopped

  order-service:
    build: ../services/order-service
    container_name: areapadi_order_service
    ports:
      - "8003:8003"
    env_file: ../.env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped

  rider-dispatch:
    build: ../services/rider-dispatch
    container_name: areapadi_rider_dispatch
    ports:
      - "8004:8004"
    env_file: ../.env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped

  rating-engine:
    build: ../services/rating-engine
    container_name: areapadi_rating_engine
    ports:
      - "8005:8005"
    env_file: ../.env
    depends_on:
      postgres: { condition: service_healthy }
    restart: unless-stopped

  geo-service:
    build: ../services/geo-service
    container_name: areapadi_geo_service
    ports:
      - "8006:8006"
    env_file: ../.env
    depends_on:
      postgres: { condition: service_healthy }
    restart: unless-stopped

  payment-service:
    build: ../services/payment-service
    container_name: areapadi_payment_service
    ports:
      - "8007:8007"
    env_file: ../.env
    depends_on:
      postgres: { condition: service_healthy }
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
